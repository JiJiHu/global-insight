[build]
builder = "NIXPACKS"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Cron 定时任务 - 使用 heredoc 或正确的方式
[[crons]]
name = "data-fetcher"
schedule = "0 */2 * * *"
command = "bash -c 'SERVICE_TYPE=cron ./start.sh'"
