[build]
builder = "NIXPACKS"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Cron 定时任务 - 每小时执行一次
[[crons]]
name = "hourly-data-fetcher"
schedule = "0 * * * *"
command = "/opt/venv/bin/python backend/cron_simple.py"
