[build]
builder = "NIXPACKS"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Cron 定时任务 - 直接运行 Python 脚本，不使用 start.sh
[[crons]]
name = "data-fetcher"
schedule = "0 */2 * * *"
startCommand = "python backend/cron_simple.py"
