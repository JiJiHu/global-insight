version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finance-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finance_insight
      POSTGRES_USER: jack
      POSTGRES_PASSWORD: ChangeMe123!
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - finance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jack -d finance_insight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端服务（精简版）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.minimal
    container_name: finance-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jack:ChangeMe123!@postgres:5432/finance_insight
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-network
    restart: unless-stopped

  # Nginx 前端服务（精简版）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.minimal
    container_name: finance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - finance-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  finance-network:
    driver: bridge
