[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate", "pip install fastapi uvicorn psycopg2-binary pgvector sqlalchemy pydantic python-dotenv requests aiohttp httpx dashscope yfinance"]

