name: Global Insight Data Pipeline

on:
  schedule:
    # 每 6 小时抓取市场数据
    - cron: '0 */6 * * *'
    # 每天早上 9 点生成 AI 洞察
    - cron: '0 9 * * *'
    # 每天早上 10 点构建知识图谱
    - cron: '0 10 * * *'
    # 每天早上 8 点抓取新闻
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Fetch market data
        run: |
          cd backend
          python fetch_market_data.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      - name: Fetch commodities
        run: |
          cd backend
          python fetch_commodities.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Fetch news
        run: |
          cd backend
          python fetch_news_sources.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

  generate-insights:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [fetch-market-data, fetch-news]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Generate AI insights
        run: |
          cd backend
          python generate_ai_insights_v3.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [fetch-market-data]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Build knowledge graph
        run: |
          cd backend
          python build_knowledge_graph_v2.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
