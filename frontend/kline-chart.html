<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K 线图 - 金融数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .title { font-size: 24px; font-weight: 700; color: #1a202c; }
        .controls { display: flex; gap: 12px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        #chart-container { width: 100%; height: 600px; }
        .loading { text-align: center; padding: 100px; color: #718096; }
        .stock-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .info-card {
            background: #f7fafc;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .info-label { color: #718096; font-size: 13px; margin-bottom: 4px; }
        .info-value { color: #1a202c; font-size: 20px; font-weight: 700; }
        .up { color: #10b981; }
        .down { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">📈 K 线图 - <span id="stock-name">加载中...</span></div>
            <div class="controls">
                <select id="stock-select" class="btn btn-secondary">
                    <option value="AAPL">AAPL</option>
                    <option value="GOOGL">GOOGL</option>
                    <option value="MSFT">MSFT</option>
                    <option value="TSLA">TSLA</option>
                    <option value="NVDA">NVDA</option>
                </select>
                <button class="btn btn-primary" onclick="loadData()">🔄 刷新</button>
            </div>
        </div>
        
        <div class="stock-info" id="stock-info">
            <div class="info-card">
                <div class="info-label">当前价格</div>
                <div class="info-value" id="current-price">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">涨跌幅</div>
                <div class="info-value" id="change-percent">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">成交量</div>
                <div class="info-value" id="volume">-</div>
            </div>
            <div class="info-card">
                <div class="info-label">更新时间</div>
                <div class="info-value" id="update-time">-</div>
            </div>
        </div>
        
        <div id="chart-container">
            <div class="loading">正在加载 K 线图...</div>
        </div>
    </div>
    
    <script>
        let chart = null;
        const API_BASE = '/api/v1';
        
        // 初始化图表
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = echarts.init(container);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                grid: { left: '3%', right: '3%', bottom: '10%', top: '5%' },
                xAxis: {
                    type: 'category',
                    data: [],
                    scale: true,
                    boundaryGap: false,
                    axisLine: { onZero: false },
                    splitLine: { show: false },
                    min: 'dataMin',
                    max: 'dataMax'
                },
                yAxis: {
                    scale: true,
                    splitArea: { show: true }
                },
                dataZoom: [
                    { type: 'inside', start: 50, end: 100 },
                    { show: true, type: 'slider', top: '90%', start: 50, end: 100 }
                ],
                series: [{
                    name: 'K 线',
                    type: 'candlestick',
                    data: [],
                    itemStyle: {
                        color: '#10b981',
                        color0: '#ef4444',
                        borderColor: '#10b981',
                        borderColor0: '#ef4444'
                    }
                }]
            };
            
            chart.setOption(option);
            
            window.addEventListener('resize', () => chart.resize());
        }
        
        // 加载数据
        async function loadData() {
            const symbol = document.getElementById('stock-select').value;
            document.getElementById('stock-name').textContent = symbol;
            
            try {
                // 获取实时数据
                const response = await fetch(`${API_BASE}/market`);
                const data = await response.json();
                
                const stockData = data.find(d => d.symbol === symbol);
                if (stockData) {
                    updateStockInfo(stockData);
                }
                
                // 生成模拟 K 线数据（实际应该从历史数据 API 获取）
                generateMockKlineData(symbol);
                
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('chart-container').innerHTML = 
                    '<div class="loading">加载失败，请刷新重试</div>';
            }
        }
        
        // 更新股票信息
        function updateStockInfo(data) {
            document.getElementById('current-price').textContent = `$${data.price.toFixed(2)}`;
            
            const changeEl = document.getElementById('change-percent');
            const change = data.change_percent;
            changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeEl.className = 'info-value ' + (change >= 0 ? 'up' : 'down');
            
            document.getElementById('volume').textContent = formatVolume(data.volume);
            document.getElementById('update-time').textContent = formatTime(data.timestamp);
        }
        
        // 生成模拟 K 线数据
        function generateMockKlineData(symbol) {
            const basePrice = Math.random() * 200 + 100;
            const data = [];
            const dates = [];
            
            let price = basePrice;
            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dates.push(date.toISOString().split('T')[0]);
                
                const change = (Math.random() - 0.5) * 10;
                const open = price;
                const close = price + change;
                const low = Math.min(open, close) - Math.random() * 5;
                const high = Math.max(open, close) + Math.random() * 5;
                
                data.push([open.toFixed(2), close.toFixed(2), low.toFixed(2), high.toFixed(2)]);
                price = close;
            }
            
            chart.setOption({
                xAxis: { data: dates },
                series: [{ data: data }]
            });
        }
        
        // 格式化成交量
        function formatVolume(volume) {
            if (!volume) return '0';
            if (volume >= 1000000) return (volume / 1000000).toFixed(1) + 'M';
            if (volume >= 1000) return (volume / 1000).toFixed(1) + 'K';
            return volume.toString();
        }
        
        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 初始化
        initChart();
        loadData();
        
        // 股票选择变化
        document.getElementById('stock-select').addEventListener('change', loadData);
    </script>
</body>
</html>
